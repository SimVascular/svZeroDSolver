# Tuning configuration for right_heart_pa example (Nelder-Mead, cgs units)

model:
  config_file: "model.json"

parameters:
  - name: "RA.Emax"
    bounds: [10.0, 200.0]
  - name: "RA.Epass"
    bounds: [10.0, 200.0]
  - name: "RV.Emax"
    bounds: [100.0, 2000.0]
  - name: "RV.Epass"
    bounds: [10.0, 500.0]

  - name: "MPA.R_poiseuille"
    bounds: [10.0, 1000.0]

  - name: "RPA.R_poiseuille"
    bounds: [10.0, 1000.0]
  - name: "RPA.L"
    bounds: [0.1, 2.0]
  - name: "RPA.stenosis_coefficient"
    bounds: [0.0, 1.0e-3]

  - name: "LPA.R_poiseuille"
    bounds: [10.0, 1000.0]
  - name: "LPA.L"
    bounds: [0.1, 2.0]
  - name: "LPA.stenosis_coefficient"
    bounds: [0.0, 1.0e-3]

  - name: "RCR_RPA.Rp"
    bounds: [10.0, 5000.0]
  - name: "RCR_RPA.Rd"
    bounds: [10.0, 5000.0]
  - name: "RCR_RPA.C"
    bounds: [1.0e-4, 1.0e-2]

  - name: "RCR_LPA.Rp"
    bounds: [10.0, 5000.0]
  - name: "RCR_LPA.Rd"
    bounds: [10.0, 5000.0]
  - name: "RCR_LPA.C"
    bounds: [1.0e-4, 1.0e-2]

# Targets
# Cardiac output: mean flow through PV->MPA
# Flow split: mean flows through RPA/LPA outlets

targets:
  - name: "flow:PV:MPA"
    type: "mean"
    target_value: 83.33
    uncertainty: 10%
    weight: 1.0

  - name: "pressure:PV:MPA"
    type: "max"
    target_value: 33330.0
    uncertainty: 10%
    weight: 1.0
  - name: "pressure:PV:MPA"
    type: "min"
    target_value: 10670.0
    uncertainty: 10%
    weight: 1.0
  - name: "pressure:PV:MPA"
    type: "mean"
    target_value: 20000.0
    uncertainty: 10%
    weight: 1.0

  - name: "flow:RPA:RCR_RPA"
    type: "mean"
    target_value: 45.83
    uncertainty: 10%
    weight: 1.0
  - name: "flow:LPA:RCR_LPA"
    type: "mean"
    target_value: 37.5
    uncertainty: 10%
    weight: 1.0

objective:
  normalize: true

optimization:
  terminate_at_zero: true
  algorithm: "Nelder-Mead"
  maxiter: 8000
  xatol: 1e-6
  fatol: 1e-6
  adaptive: true

output:
  directory: "optimization_results_right_heart_pa_nm"
  save_history: true
  save_plots: true
  save_final_config: true
