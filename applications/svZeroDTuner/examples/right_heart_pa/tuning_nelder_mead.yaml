# Tuning configuration for right_heart_pa example (Nelder-Mead, cgs units)
#
# Run with:
#   svzerodtuner optimize tuning_nelder_mead.yaml

model:
  config_file: "model.json"

parameters:
  - name: "RA.Emax"
    bounds: [10.0, 200.0]
  - name: "RA.Epass"
    bounds: [10.0, 200.0]
  - name: "RV.Emax"
    bounds: [100.0, 2000.0]
  - name: "RV.Epass"
    bounds: [10.0, 500.0]

  - name: "MPA.R_poiseuille"
    bounds: [10.0, 1000.0]

  - name: "RPA.R_poiseuille"
    bounds: [10.0, 1000.0]
  - name: "RPA.L"
    bounds: [0.1, 2.0]
  - name: "RPA.stenosis_coefficient"
    bounds: [0.0, 1.0e-3]

  - name: "LPA.R_poiseuille"
    bounds: [10.0, 1000.0]
  - name: "LPA.L"
    bounds: [0.1, 2.0]
  - name: "LPA.stenosis_coefficient"
    bounds: [0.0, 1.0e-3]

  - name: "RCR_RPA.Rp"
    bounds: [10.0, 5000.0]
  - name: "RCR_RPA.Rd"
    bounds: [10.0, 5000.0]
  - name: "RCR_RPA.C"
    bounds: [1.0e-4, 1.0e-2]

  - name: "RCR_LPA.Rp"
    bounds: [10.0, 5000.0]
  - name: "RCR_LPA.Rd"
    bounds: [10.0, 5000.0]
  - name: "RCR_LPA.C"
    bounds: [1.0e-4, 1.0e-2]

# Target outputs
# Specify which outputs you want to match and their target values
# Provide expressions with output names from baseline_summary.csv
# Cardiac output is taken as mean flow through the PV->MPA connection.
# RPA/LPA split is enforced by targeting the mean flows in each branch.
targets:
  - name: Pulmonary arterial mean flow
    type: scalar
    expression: np.mean(flow:PV:MPA)
    target_value: 83.33
    relative_bounds: 10%
    weight: 1.0
  - name: Pulmonary arterial max pressure
    type: scalar
    expression: np.max(pressure:PV:MPA)
    target_value: 33330.0
    relative_bounds: 10%
    weight: 1.0
  - name: Pulmonary arterial min pressure
    type: scalar
    expression: np.min(pressure:PV:MPA)
    target_value: 10670.0
    relative_bounds: 10%
    weight: 1.0
  - name: Pulmonary arterial mean pressure
    type: scalar
    expression: np.mean(pressure:PV:MPA)
    target_value: 20000.0
    relative_bounds: 10%
    weight: 1.0
  - name: Right pulmonary artery mean flow
    type: scalar
    expression: np.mean(flow:RPA:RCR_RPA)
    target_value: 45.83
    relative_bounds: 10%
    weight: 1.0
  - name: Left pulmonary artery mean flow
    type: scalar
    expression: np.mean(flow:LPA:RCR_LPA)
    target_value: 37.5
    relative_bounds: 10%
    weight: 1.0

objective:
  # L1 or L2 norm (of relative errors)
  norm: L1

optimization:
  terminate_at_zero: true
  algorithm: "Nelder-Mead"
  maxiter: 8000
  xatol: 1e-6
  fatol: 1e-6
  adaptive: true

output:
  directory: "optimization_results_right_heart_pa_nm"
  save_history: true
  save_plots: true
  save_final_config: true
