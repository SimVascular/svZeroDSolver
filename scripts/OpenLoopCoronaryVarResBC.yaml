variables:
  - Pin
  - Qin
  - Vim
  - Pa

derivatives:
  - dPin_dt
  - dQin_dt
  - dVim_dt
  - dPa_dt

constants:
  - Ra
  - Ram
  - Rv
  - Ca
  - Cim
  - Pim
  - Pv
  - Pim_0
  - P_Cim_0

time_dependent:
  - Pim
  - Ram

residuals:
  - Cim * Rv * Qin - Vim + Cim * (-P_Cim_0 + Pim_0 - Pim + Pv) - Cim * Rv * dVim_dt - Ca * Cim * Rv * dPin_dt + Ra * Ca * Cim * Rv * dQin_dt + Ca * Cim * Rv * dPa_dt
  - Cim * Rv * Pin - Cim * Rv * Ra * Qin - Rv * Vim - Cim * (Rv + Ram) * (P_Cim_0 - Pim_0 + Pim) - Cim * Rv * Ram * dVim_dt - Ram * Vim + Ram * Cim * Pv
