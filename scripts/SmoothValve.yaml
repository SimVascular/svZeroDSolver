variables:
  - Pin
  - Qin
  - Pout
  - Qout
  - valve_status

derivatives:
  - dPin_dt
  - dQin_dt
  - dPout_dt
  - dQout_dt
  - dvalve_status_dt

constants:
  - Rmax
  - Rmin
  - k
  - L
  - C
  - Rd

helper_functions: |
  from sympy import tanh, cosh

residuals:
  # Eq 0: P_in - P_out - R(P)*Q_in - L*dQ_out - Rd*Q_in = 0
  # where R(P) = Rmin + (Rmax - Rmin) * 0.5 * (1 + tanh(k*(Pout - Pin)))
  # Rd is a constant damping resistance (always present)
  - Pin - Pout - Qin * (Rmin + (Rmax - Rmin) / 2 * (1 + tanh(k * (Pout - Pin)))) - L * dQout_dt - Rd * Qin
  # Eq 1: Q_in - Q_out - C*dP_in = 0
  - Qin - Qout - C * dPin_dt
  # Eq 2: valve_status = 0.5*(1 + tanh(k*(Pout - Pin)))
  - valve_status - (1 + tanh(k * (Pout - Pin))) / 2
