# Tuning configuration for Regazzoni closed-loop model
# Tests time series target matching: tune parameters to match a target waveform.
#
# INSTRUCTIONS:
# 1. Run baseline first to inspect outputs: python main.py (with run_baseline)
# 2. Optionally create target from baseline: copy a column from baseline_results.csv
#    to targets/ as CSV with 'time' and 'value' columns
# 3. Edit main.py to use: run_optimization("tuning_time_series_target.yaml")
# 4. Run: python main.py

model:
  config_file: "model.json"

# Parameters to optimize
parameters:
  - name: "LV.Emax"
    bounds: [1e7, 1e9]
  - name: "AR_SYS.C"
    bounds: [1e-9, 1e-7]

# Time series target: match pressure:AV:AR_SYS waveform from target file
# Target CSV must have 'time' and 'value' columns
targets:
  - name: "pressure:AV:AR_SYS"
    type: "time_series"
    # Run create_target_from_baseline.py to create the target file from the baseline results.
    target_file: "targets/target_pressure_ar_sys.csv"
    uncertainty: "10%"
    weight: 1.0
  
  - name: "Vc:LV"
    type: "max"
    target_value: 191.0e-6  # m^3
    uncertainty: 10%
    weight: 1.0

# Objective function
objective:
  normalize: true

# Optimization
optimization:
  terminate_at_zero: true
  algorithm: "Nelder-Mead"
  maxiter: 100
  xatol: 1e-6
  fatol: 1e-6
  adaptive: true

# Output
output:
  directory: "optimization_results_time_series"
  save_history: true
  save_plots: true
  save_final_config: true
