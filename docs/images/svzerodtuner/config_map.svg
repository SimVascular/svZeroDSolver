<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <rect width="900" height="360" fill="#ffffff"/>
  <style>
    .h { font-family:Arial, sans-serif; font-size:18px; fill:#111827; font-weight:bold; }
    .b { font-family:Consolas, monospace; font-size:14px; fill:#1f2937; }
    .s { fill:#f9fafb; stroke:#111827; stroke-width:1.5; rx:8; ry:8; }
  </style>
  <text class="h" x="20" y="32">svZeroDTuner YAML Structure</text>

  <rect class="s" x="20" y="50" width="250" height="290"/>
  <text class="b" x="35" y="80">model:</text>
  <text class="b" x="35" y="105">parameters:</text>
  <text class="b" x="35" y="130">targets:</text>
  <text class="b" x="35" y="155">objective:</text>
  <text class="b" x="35" y="180">optimization:</text>
  <text class="b" x="35" y="205">output:</text>

  <rect class="s" x="300" y="50" width="280" height="140"/>
  <text class="b" x="315" y="80">model.config_file</text>
  <text class="b" x="315" y="105">parameters[].name</text>
  <text class="b" x="315" y="130">parameters[].bounds</text>
  <text class="b" x="315" y="155">parameters[].scaling</text>

  <rect class="s" x="300" y="200" width="280" height="140"/>
  <text class="b" x="315" y="230">targets[].type</text>
  <text class="b" x="315" y="255">targets[].expression</text>
  <text class="b" x="315" y="280">target_value / target_file / target_range</text>
  <text class="b" x="315" y="305">relative_bounds, weight</text>

  <rect class="s" x="610" y="50" width="270" height="140"/>
  <text class="b" x="625" y="80">objective.norm (L1/L2)</text>
  <text class="b" x="625" y="105">optimization.algorithm</text>
  <text class="b" x="625" y="130">SciPy options passthrough</text>
  <text class="b" x="625" y="155">terminate_at_zero</text>

  <rect class="s" x="610" y="200" width="270" height="140"/>
  <text class="b" x="625" y="230">output.directory</text>
  <text class="b" x="625" y="255">save_history, save_plots</text>
  <text class="b" x="625" y="280">save_final_config</text>
  <text class="b" x="625" y="305">(sensitivity) n_samples, QoIs</text>
</svg>
